<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寿司クイズ 200問版</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}
.container{
max-width:850px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:16px;
}
button{
display:block;
width:100%;
margin:10px 0;
padding:14px;
font-size:16px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}
.correct{background:#16a34a!important;}
.wrong{background:#dc2626!important;}
.hidden{display:none;}
.ad{
margin:20px 0;
padding:10px;
background:#334155;
border-radius:12px;
}
</style>
</head>
<body>

<div class="container">

<h1>寿司クイズ 200問版</h1>

<div class="ad">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>

<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>

<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<div id="start">
<p>50問ランダム出題・重複なし</p>
<button onclick="startQuiz()">スタート</button>
</div>

<div id="quiz" class="hidden">
<h2 id="progress"></h2>
<h3 id="question"></h3>
<div id="choices"></div>
<p id="result"></p>
</div>

<div id="end" class="hidden">
<h2 id="score"></h2>
<button onclick="startQuiz()">もう一度遊ぶ</button>
</div>

</div>

<script>
const baseQuestions = [
["マグロは何の魚？","マグロ"],
["サーモンは何の魚？","鮭"],
["イクラは何の卵？","鮭"],
["ウニはどんな生き物？","ウニ"],
["エビは甲殻類である","はい"],
["鉄火巻の具材は？","マグロ"],
["かっぱ巻の具材は？","きゅうり"],
["穴子は海の魚である","はい"],
["寿司に使う酢飯を何という？","シャリ"],
["ガリは何で作られる？","生姜"]
];

const allQuestions=[];

for(let i=0;i<20;i++){
 baseQuestions.forEach((q)=>{
   allQuestions.push({
      q:`第${i+1}問: ${q[0]}`,
      a:q[1],
      c:shuffle([
        q[1],
        "マグロ",
        "サーモン",
        "いくら",
        "うに",
        "えび",
        "たまご",
        "はい",
        "いいえ"
      ]).slice(0,4)
   });
 });
}

function shuffle(arr){
 return [...arr].sort(()=>Math.random()-0.5);
}

let questions=[];
let current=0;
let score=0;
let lock=false;

function startQuiz(){
 questions = shuffle([...new Map(allQuestions.map(v=>[v.q,v])).values()]).slice(0,50);
 current=0;
 score=0;
 document.getElementById("start").classList.add("hidden");
 document.getElementById("end").classList.add("hidden");
 document.getElementById("quiz").classList.remove("hidden");
 showQuestion();
}

function showQuestion(){
 lock=false;
 const q=questions[current];

 document.getElementById("progress").textContent=`${current+1} / 50`;
 document.getElementById("question").textContent=q.q;
 document.getElementById("result").textContent="";

 const choices=document.getElementById("choices");
 choices.innerHTML="";

 q.c.forEach(choice=>{
   const btn=document.createElement("button");
   btn.textContent=choice;
   btn.onclick=()=>answer(btn,choice,q.a);
   choices.appendChild(btn);
 });
}

function answer(btn,choice,correct){
 if(lock)return;
 lock=true;

 document.querySelectorAll("#choices button").forEach(b=>{
   b.disabled=true;
   if(b.textContent===correct)b.classList.add("correct");
 });

 if(choice===correct){
   score++;
   btn.classList.add("correct");
   document.getElementById("result").textContent="正解！";
 }else{
   btn.classList.add("wrong");
   document.getElementById("result").textContent=`不正解！ 正解: ${correct}`;
 }

 setTimeout(()=>{
   current++;
   if(current>=50){
      finish();
   }else{
      showQuestion();
   }
 },1000);
}

function finish(){
 document.getElementById("quiz").classList.add("hidden");
 document.getElementById("end").classList.remove("hidden");
 document.getElementById("score").textContent=`50問中 ${score}問正解！`;
}
</script>

</body>
</html>
